# DeepSpeed ZeRO-3 + Ulysses Sequence Parallelism (SP=8) on 2 nodes × 8 H200 GPUs
#
# SP=8 within each node (NVLink), DP_shard=2 across nodes (ZeRO-3).
# Keeps the heavy all-to-all SP traffic on NVLink; only gradient/param
# sharding goes over the inter-node fabric.
#
# Effective parallelism: SP=8, DP=2
# Constraint: dp_shard_size * sp_size = num_processes (2 * 8 = 16)

compute_environment: LOCAL_MACHINE

num_machines: 2
machine_rank: 0
num_processes: 16

main_process_ip: null
main_process_port: 29500

distributed_type: DEEPSPEED

mixed_precision: bf16
downcast_bf16: "no"

deepspeed_config:
  zero_stage: 3
  zero3_init_flag: true
  zero3_save_16bit_model: true
  offload_optimizer_device: none
  offload_param_device: none
  seq_parallel_communication_data_type: bf16

parallelism_config:
  parallelism_config_dp_replicate_size: 1
  parallelism_config_dp_shard_size: 2
  parallelism_config_tp_size: 1
  parallelism_config_sp_size: 8
  parallelism_config_sp_backend: deepspeed
  parallelism_config_sp_seq_length_is_variable: true
  parallelism_config_sp_attn_implementation: flash_attention_2

rdzv_backend: static
same_network: true
main_training_function: main
