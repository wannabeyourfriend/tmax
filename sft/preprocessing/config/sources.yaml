sources:
  - name: "open-thoughts/OpenThoughts-Agent-v1-SFT"
    type: huggingface
    conversations_column: "conversations"
    subsets:
      - subset: null
        source_label: "open-thoughts/OpenThoughts-Agent-v1-SFT"

  - name: "nvidia/Nemotron-Terminal-Corpus"
    type: huggingface_parquet
    conversations_column: "conversations"
    subsets:
      - subset: "dataset_adapters"
        pattern: "dataset_adapters/*.parquet"
        source_label: "nvidia/Nemotron-Terminal-Corpus/dataset_adapters"
      - subset: "skill_based_easy"
        pattern: "synthetic_tasks/skill_based/easy/*/data_filtered.parquet"
        source_label: "nvidia/Nemotron-Terminal-Corpus/skill_based_easy"
      - subset: "skill_based_medium"
        pattern: "synthetic_tasks/skill_based/medium/*/data_filtered.parquet"
        source_label: "nvidia/Nemotron-Terminal-Corpus/skill_based_medium"
      - subset: "skill_based_mixed"
        pattern: "synthetic_tasks/skill_based/mixed/*/data_filtered.parquet"
        source_label: "nvidia/Nemotron-Terminal-Corpus/skill_based_mixed"

  - name: "allenai/Sera-4.6-Lite-47000"
    type: huggingface
    format: sera
    conversations_column: "messages"
    subsets:
      - subset: null
        source_label: "allenai/Sera-4.6-Lite-47000"

  # Plain Terminus-2 trajectories (system+task in message 0 with the same
  # `Task Description:` / `Current terminal state:` delimiters, assistants
  # emit `{"analysis","plan","commands":[{"keystrokes","duration"}],"task_complete"}`
  # JSON). Parses with the default `convert_trace` path -- no new converter
  # needed.
  - name: "m-a-p/TerminalTraj"
    type: huggingface
    conversations_column: "messages"
    subsets:
      - subset: null
        source_label: "m-a-p/TerminalTraj"

  # Pass-through source: already in the SFT target schema (messages +
  # tools + source + metadata, vanillux-harness rows) thanks to
  # `convert_trajectories.py` having produced this dataset. Pipeline
  # copies rows verbatim instead of routing through `convert_trace`.
  # ``passthrough_config`` is the HF dataset config / subset name to
  # load.
  - name: "osieosie/tmax-sft-skill-tax-20260505-2.2k-combined-balanced-qwen3.6-27b-thinking"
    type: huggingface_passthrough
    subsets:
      - subset: "skill_tax_20260505_2.2k_combined_balanced_thinking_all"
        passthrough_config: "skill_tax_20260505_2.2k_combined_balanced_thinking_all"
        source_label: "skill_tax_20260505_2.2k_combined_balanced_thinking_all"
